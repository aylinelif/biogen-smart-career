<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGen AI | Smart Career Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdff; }
        .grad-primary { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 20px 50px -12px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 glass border-b border-slate-100 px-8 py-4 flex justify-between items-center text-slate-800">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 grad-primary rounded-lg flex items-center justify-center text-white font-bold text-xl italic">B</div>
            <span class="text-xl font-extrabold text-slate-800 tracking-tight">BioGen<span class="text-indigo-600">.ai</span></span>
        </div>
        <div id="model-badge" class="text-[10px] bg-emerald-50 text-emerald-600 px-3 py-1.5 rounded-full font-bold border border-emerald-100 uppercase tracking-wider">
            GÜVENLİ MOD: AKTİF
        </div>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto px-6 py-12 w-full text-center">
        <h1 class="text-5xl md:text-6xl font-black text-slate-900 mb-6 tracking-tight">Profilini <span class="text-transparent bg-clip-text grad-primary">Yapay Zeka</span> İle Güçlendir.</h1>
        
        <div class="grid lg:grid-cols-2 gap-8 items-start text-left mt-12">
            <div class="bg-white rounded-[2.5rem] p-8 card-shadow border border-slate-100">
                <textarea id="userInput" class="w-full h-64 p-6 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50 text-slate-700 text-lg mb-6 resize-none" placeholder="Yeteneklerini buraya yaz..."></textarea>
                <button onclick="generate()" class="w-full grad-primary text-white font-bold py-5 rounded-[1.5rem] shadow-xl hover:scale-[1.02] transition-all text-lg uppercase">PROFİLİMİ OLUŞTUR</button>
            </div>

            <div class="bg-slate-900 rounded-[2.5rem] p-8 shadow-2xl relative min-h-[500px] flex flex-col">
                <div id="output" class="text-slate-300 leading-relaxed text-lg italic opacity-40 whitespace-pre-wrap">Yapay zeka motoru hazır. Giriş bekleniyor...</div>
                <div id="loader" class="hidden absolute inset-0 bg-slate-900/95 rounded-[2.5rem] flex items-center justify-center">
                    <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-12 px-8 border-t border-slate-100 text-center text-slate-400 text-sm">
        © 2026 BioGen.ai • Aylin Elif Gökdemir tarafından geliştirildi.
    </footer>

    <script>
        /**
         * 🛡️ GÜVENLİK PROTOKOLÜ: 
         * GitHub üzerinde API anahtarı açıkça paylaşılmamaktadır. 
         * Uygulama, Netlify üzerinde gizli çevre değişkenleri (env) mantığı ile deploy edilmiştir.
         */
        const KEY = "SECRET_API_KEY_ON_NETLIFY"; 

        async function generate() {
            if(KEY.includes("SECRET")) {
                alert("Güvenlik nedeniyle GitHub sürümünde anahtar gizlenmiştir. Lütfen projenin CANLI (Netlify) linkini kontrol edin.");
                return;
            }
            // Gerçek API çağrı kodları buraya gelir...
        }
    </script>
</body>
</html>
