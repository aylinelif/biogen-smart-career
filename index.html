<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGen AI | Smart Career Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfdff; }
        .grad-primary { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 20px 50px -12px rgba(79, 70, 229, 0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 glass border-b border-slate-100 px-8 py-4 flex justify-between items-center text-slate-800">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 grad-primary rounded-lg flex items-center justify-center text-white font-bold text-xl italic">B</div>
            <span class="text-xl font-extrabold text-slate-800 tracking-tight">BioGen<span class="text-indigo-600">.ai</span></span>
        </div>
        <div id="model-badge" class="text-[10px] bg-indigo-50 text-indigo-500 px-3 py-1.5 rounded-full font-bold border border-indigo-100 uppercase tracking-wider animate-pulse">
            SİSTEM HAZIRLANIYOR...
        </div>
    </nav>

    <main class="flex-grow max-w-6xl mx-auto px-6 py-12 w-full">
        <div class="text-center mb-16">
            <h1 class="text-5xl md:text-6xl font-black text-slate-900 mb-6 tracking-tight leading-none">Profilini <span class="text-transparent bg-clip-text grad-primary">Yapay Zeka</span> İle Güçlendir.</h1>
            <p class="text-slate-500 text-lg max-w-2xl mx-auto font-medium">Kariyer notlarını saniyeler içinde profesyonel bir LinkedIn özetine dönüştür.</p>
        </div>

        <div class="grid lg:grid-cols-2 gap-8 items-start">
            <div class="bg-white rounded-[2.5rem] p-8 card-shadow border border-slate-100">
                <div class="flex gap-2 mb-6">
                    <button onclick="setExample('Bilgisayar mühendisliği öğrencisiyim. Veri bilimi ve yapay zekayla ilgileniyorum. Python ve SQL biliyorum.')" class="text-[10px] bg-slate-100 hover:bg-indigo-100 text-slate-600 px-3 py-1.5 rounded-full transition-all font-bold uppercase">Öğrenci Örneği</button>
                    <button onclick="setExample('Dijital pazarlama uzmanıyım. Stratejik planlama ve içerik yönetimi konusunda 3 yıl deneyimim var.')" class="text-[10px] bg-slate-100 hover:bg-indigo-100 text-slate-600 px-3 py-1.5 rounded-full transition-all font-bold uppercase">Uzman Örneği</button>
                </div>
                <textarea id="userInput" class="w-full h-64 p-6 rounded-2xl border-none focus:ring-2 focus:ring-indigo-500 outline-none bg-slate-50 text-slate-700 text-lg placeholder:text-slate-400 mb-6 resize-none" placeholder="Yeteneklerini buraya karala..."></textarea>
                <button onclick="generate()" id="btn" class="w-full grad-primary text-white font-bold py-5 rounded-[1.5rem] shadow-xl shadow-indigo-200 hover:scale-[1.02] active:scale-[0.98] transition-all text-lg tracking-wide uppercase">PROFİLİMİ OLUŞTUR</button>
            </div>

            <div class="bg-slate-900 rounded-[2.5rem] p-8 shadow-2xl relative min-h-[500px] flex flex-col">
                <div class="flex justify-between items-center mb-8">
                    <div class="flex gap-1.5">
                        <div class="w-3 h-3 rounded-full bg-red-400"></div><div class="w-3 h-3 rounded-full bg-amber-400"></div><div class="w-3 h-3 rounded-full bg-emerald-400"></div>
                    </div>
                    <button onclick="copyToClipboard()" class="text-[10px] font-bold text-slate-500 hover:text-indigo-400 tracking-widest uppercase transition-colors">KOPYALA</button>
                </div>
                <div id="output" class="text-slate-300 leading-relaxed text-lg italic opacity-40 font-light whitespace-pre-wrap">Yapay zeka motoru hazır. Giriş bekleniyor...</div>
                <div id="loader" class="hidden absolute inset-0 bg-slate-900/95 rounded-[2.5rem] flex flex-col items-center justify-center text-center p-8">
                    <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                    <p class="text-indigo-400 text-xs font-black tracking-[0.4em] uppercase text-xs">AI ANALİZ EDİYOR</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="mt-auto py-12 px-8 border-t border-slate-100 text-center">
        <p class="text-slate-400 text-sm font-medium italic">© 2026 BioGen.ai • Aylin Elif Gökdemir tarafından geliştirildi.</p>
    </footer>

    <script>
        /**
         * 🛡️ GÜVENLİK NOTU: API anahtarı botlar tarafından iptal edilmemesi için 
         * GitHub üzerinde gizlenmiştir. Uygulama canlı ortamda (Netlify) 
         * manuel deploy stratejisi ile çalışmaktadır.
         */
        const KEY = "SECRET_API_KEY_ON_NETLIFY"; 
        
        let activeModel = "models/gemini-1.5-flash";

        async function findBestModel() {
            if(KEY.includes("SECRET")) {
                const badge = document.getElementById('model-badge');
                badge.innerText = "GÜVENLİ MOD: AKTİF";
                badge.classList.remove('animate-pulse', 'bg-indigo-50', 'text-indigo-500');
                badge.classList.add('bg-emerald-50', 'text-emerald-600', 'border-emerald-100');
                return;
            }
            // ... (Daha önce konuştuğumuz model bulma mantığı burada çalışır)
        }
        findBestModel();

        function setExample(text) { document.getElementById('userInput').value = text; }

        async function generate() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            const loader = document.getElementById('loader');
            
            // Eğer GitHub sürümü ise kullanıcıyı yönlendir
            if(KEY.includes("SECRET")) {
                alert("GitHub sürümünde güvenlik nedeniyle API anahtarı gizlenmiştir. Lütfen projenin canlı (Netlify) linkini ziyaret ediniz.");
                return;
            }

            if(!input.trim()) return alert("Lütfen bir şeyler yazın!");
            loader.classList.remove('hidden');
            output.innerText = "";

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/${activeModel}:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Profesyonel LinkedIn özeti yaz: " + input }] }] })
                });
                const data = await res.json();
                output.innerText = data.candidates[0].content.parts[0].text;
                output.classList.remove('italic', 'opacity-40');
            } catch (err) { output.innerText = "Hata! Canlı linki deneyiniz."; }
            finally { loader.classList.add('hidden'); }
        }

        function copyToClipboard() {
            const text = document.getElementById('output').innerText;
            if(!text || text.includes("hazır")) return;
            navigator.clipboard.writeText(text);
            alert("Metin kopyalandı! 🔥");
        }
    </script>
</body>
</html>
